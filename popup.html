<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bookmark Duplicate Cleaner</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 380px;
      min-height: 500px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8f9fa;
      color: #333;
    }
    
    .header {
      padding: 20px;
      background: white;
      border-bottom: 1px solid #e9ecef;
    }
    
    .header h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
      color: #495057;
    }
    
    .header p {
      font-size: 12px;
      color: #6c757d;
    }
    
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: #e9ecef;
    }
    
    .stat-card {
      background: white;
      padding: 16px;
      text-align: center;
    }
    
    .stat-number {
      font-size: 24px;
      font-weight: 600;
      color: #007bff;
      margin-bottom: 4px;
    }
    
    .stat-label {
      font-size: 11px;
      color: #6c757d;
    }
    
    .main-content {
      padding: 20px;
      background: white;
    }
    
    .scan-button {
      width: 100%;
      padding: 14px;
      border: 1px solid #007bff;
      border-radius: 6px;
      background: #007bff;
      color: white;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    
    .scan-button:hover:not(:disabled) {
      background: #0056b3;
    }
    
    .scan-button:disabled {
      background: #6c757d;
      border-color: #6c757d;
      cursor: not-allowed;
    }
    
    .progress-container {
      margin: 16px 0;
      display: none;
    }
    
    .progress-bar {
      width: 100%;
      height: 4px;
      background: #e9ecef;
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    
    .progress-fill {
      height: 100%;
      background: #007bff;
      width: 0%;
      transition: width 0.3s ease;
    }
    
    .progress-text {
      font-size: 12px;
      text-align: center;
      color: #6c757d;
    }
    
    .results-section {
      margin-top: 20px;
      border: 1px solid #e9ecef;
      border-radius: 6px;
      max-height: 200px;
      overflow-y: auto;
    }
    
    .result-item {
      padding: 12px;
      border-bottom: 1px solid #e9ecef;
      background: white;
    }
    
    .result-item:last-child {
      border-bottom: none;
    }
    
    .result-title {
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    
    .result-url {
      font-size: 11px;
      color: #6c757d;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    
    .action-buttons {
      display: flex;
      gap: 12px;
      margin-top: 16px;
    }
    
    .action-button {
      flex: 1;
      padding: 10px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .preview-button {
      background: white;
      color: #007bff;
      border: 1px solid #007bff;
    }
    
    .preview-button:hover:not(:disabled) {
      background: #f8f9fa;
    }
    
    .clean-button {
      background: #dc3545;
      color: white;
      border: 1px solid #dc3545;
    }
    
    .clean-button:hover:not(:disabled) {
      background: #c82333;
    }
    
    .action-button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #6c757d;
      font-size: 14px;
    }
    
    .footer {
      text-align: center;
      padding: 16px;
      font-size: 11px;
      color: #6c757d;
      border-top: 1px solid #e9ecef;
      background: #f8f9fa;
    }
    
    .alert {
      margin: 12px 0;
      padding: 12px;
      border-radius: 6px;
      font-size: 13px;
    }
    
    .alert.success {
      background: #d4edda;
      border: 1px solid #c3e6cb;
      color: #155724;
    }
    
    .alert.error {
      background: #f8d7da;
      border: 1px solid #f5c6cb;
      color: #721c24;
    }
    
    .alert.warning {
      background: #fff3cd;
      border: 1px solid #ffeaa7;
      color: #856404;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Bookmark Duplicate Cleaner</h1>
    <p>重複ブックマークを安全に削除</p>
  </div>
  
  <div class="stats">
    <div class="stat-card">
      <div class="stat-number" id="totalCount">-</div>
      <div class="stat-label">総ブックマーク</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="duplicateCount">-</div>
      <div class="stat-label">重複数</div>
    </div>
  </div>
  
  <div class="main-content">
    <button id="scanButton" class="scan-button">
      重複スキャン開始
    </button>
    
    <div class="progress-container" id="progressContainer">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-text" id="progressText">処理中...</div>
    </div>
    
    <div id="alertContainer"></div>
    
    <div class="results-section" id="resultsSection">
      <div class="empty-state">
        上のボタンを押して重複スキャンを開始してください
      </div>
    </div>
    
    <div class="action-buttons" id="actionButtons" style="display: none;">
      <button id="previewButton" class="action-button preview-button">
        プレビュー
      </button>
      <button id="cleanButton" class="action-button clean-button">
        削除実行
      </button>
    </div>
  </div>
  
  <div class="footer">
    v1.0.0 - プライバシー保護設計
  </div>

  <script src="popup.js"></script>
</body>
</html>
